server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend (used when running behind a single Nginx ingress)
    # In Docker Compose this is NOT needed — frontend calls backend directly via VITE_API_BASE_URL
    # Uncomment only if serving both frontend and backend behind this Nginx:
    # location /api/ {
    #     proxy_pass http://backend:8000/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
