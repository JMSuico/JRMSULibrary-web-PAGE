# NEVER commit real values here — use Sealed Secrets or Vault in production.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: jrmsu-library
type: Opaque
stringData:
  POSTGRES_DB: jrmsu_library
  POSTGRES_USER: jrmsu_admin
  POSTGRES_PASSWORD: <CHANGE_ME>
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: jrmsu-library
type: Opaque
stringData:
  DB_ENGINE: postgresql
  DB_NAME: jrmsu_library
  DB_USER: jrmsu_admin
  DB_PASSWORD: <CHANGE_ME>
  DB_HOST: database-svc
  DB_PORT: "5432"
  SECRET_KEY: <CHANGE_ME_50_CHAR_RANDOM_STRING>
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
