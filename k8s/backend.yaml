# Layer 3 — Backend (Django + Gunicorn)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jrmsu-library
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: django
          image: jrmsu-library/backend:latest
          envFrom:
            - secretRef:
                name: backend-secret
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: jrmsu-library
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: jrmsu-library
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
